<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offer Dashboard</title>
</head>
<body>
    <div id="icons-sprite"></div>
    <header id="main-header" class="main-header"></header>
    <nav id="top-nav" class="top-nav"></nav>

    <div class="main-layout">
        <div class="content-area">
            <div id="page-content"></div>
        </div>
        <div id="chat-widget-container"></div>
    </div>

    <div id="site-footer-container"></div>
    <nav id="mobile-bottom-nav-container" class="mobile-bottom-nav"></nav>
    <div id="modals-container"></div>
    <div id="submit-property-container"></div>
    <div id="mls-form-container"></div>
    <div id="offer-detail-container"></div>
    <div id="market-trends-container"></div>
    <div id="title-container"></div>
    <div id="investor-report-container"></div>

    <script type="module" src="/src/js/main.js"></script>
    <script>
    // Nav active state sync — runs independently of module HMR
    function syncNavActive() {
        var route = window.location.hash.slice(1).split('?')[0];
        var links = document.querySelectorAll('.nav-link');
        if (!links.length) return;
        links.forEach(function(l) {
            l.classList.remove('active');
            if (l.getAttribute('href') === route) l.classList.add('active');
        });
    }
    window.addEventListener('hashchange', function() {
        setTimeout(syncNavActive, 20);
    });
    </script>
</body>
</html>
